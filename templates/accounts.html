{% extends "base.html" %}

{% block content %}
<div x-data="accountsManager()" x-init="fetchAccounts()" class="space-y-6">
    <!-- 顶部操作栏 -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-lg shadow-sm">
        <div class="flex items-center gap-4 w-full sm:w-auto">
            <button @click="openCreateModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                新增账号
            </button>
            <button @click="openBatchModal()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                批量导入
            </button>
            <button @click="exportAccounts()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition flex items-center gap-2">
                📥 导出 CSV
            </button>
            <div class="relative">
                <select x-model="statusFilter" @change="fetchAccounts()" class="appearance-none bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 pr-8">
                    <option value="">所有状态</option>
                    <option value="待养号">待养号</option>
                    <option value="养号中">养号中</option>
                    <option value="养号就绪">养号就绪</option>
                    <option value="投放养号中">投放养号中</option>
                    <option value="异常">异常</option>
                    <option value="已封禁">已封禁</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                    <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
        </div>
        <div class="w-full sm:w-64 relative">
            <input type="text" x-model="searchQuery" @keydown.enter="fetchAccounts()" placeholder="搜索用户名或备注..." class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-10 p-2.5">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>
    </div>

    <!-- 账号列表表格 -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户名</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">养号进度</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">绑定代理</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">绑定窗口</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">最后活跃</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <template x-for="account in accounts" :key="account.id">
                    <tr :class="{'bg-red-50': account.status === '已封禁'}" @click="openDetailPanel(account)" class="cursor-pointer">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="relative" x-data="{ open: false }">
                                <button @click.stop="open = !open" class="flex items-center focus:outline-none">
                                    <span :class="getStatusColor(account.status)" class="w-3 h-3 rounded-full mr-2"></span>
                                    <span class="text-sm text-gray-900" x-text="account.status"></span>
                                    <svg x-show="account.status === '投放养号中'" class="w-4 h-4 text-yellow-500 ml-1" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                </button>
                                <!-- 状态下拉 -->
                                <div x-show="open" @click.away="open = false" class="absolute z-10 mt-2 w-40 bg-white rounded-md shadow-lg py-1 border border-gray-100">
                                    <template x-for="status in ['待养号', '养号中', '养号就绪', '投放养号中', '异常', '已封禁']">
                                        <a href="#" @click.stop.prevent="updateStatus(account.id, status); open = false" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" x-text="status"></a>
                                    </template>
                                </div>
                                <div class="mt-1 text-xs">
                                    <span x-show="isAdAssetsLoading(account)" class="text-gray-400">资产加载中</span>
                                    <span x-show="isAdAssetsReady(account)" class="text-green-700 bg-green-100 px-2 py-0.5 rounded-full">✅ 投放就绪</span>
                                    <span x-show="!isAdAssetsLoading(account) && !isAdAssetsReady(account)" class="text-yellow-800 bg-yellow-100 px-2 py-0.5 rounded-full" x-text="`⚠️ 缺少 ${getAdAssetsMissingLabel(account)}`"></span>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900" x-text="account.username"></div>
                            <div class="text-xs text-gray-500" x-text="account.notes || '无备注'"></div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700 max-w-[100px]">
                                <div class="bg-blue-600 h-2.5 rounded-full" :style="'width: ' + (account.nurture_day / 14 * 100) + '%'"></div>
                            </div>
                            <div class="text-xs text-gray-500 mt-1">Day <span x-text="account.nurture_day"></span>/14</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span x-text="account.proxy ? account.proxy.host + ':' + account.proxy.port : '未绑定'"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span x-text="account.browser_window ? account.browser_window.name : '未绑定'"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span x-text="formatDate(account.last_active_at)"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button @click.stop="openBindModal(account)" class="text-indigo-600 hover:text-indigo-900 mr-3">绑定</button>
                            <button @click.stop="deleteAccount(account.id)" class="text-red-600 hover:text-red-900">删除</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div x-show="showDetailPanel" x-cloak class="fixed inset-0 z-40">
        <div class="absolute inset-0 bg-gray-900/40" @click="closeDetailPanel()"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-xl bg-white shadow-xl overflow-y-auto">
            <div class="p-6 space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-gray-900">账号详情</h3>
                    <button class="text-gray-500 hover:text-gray-800" @click="closeDetailPanel()">关闭</button>
                </div>
                <div class="border border-gray-200 rounded-lg p-4">
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <div class="text-gray-500">用户名</div>
                            <div class="font-medium text-gray-900" x-text="detailAccount?.username || '-'"></div>
                        </div>
                        <div>
                            <div class="text-gray-500">邮箱</div>
                            <div class="font-medium text-gray-900" x-text="detailAccount?.email || '-'"></div>
                        </div>
                        <div>
                            <div class="text-gray-500">地区</div>
                            <div class="font-medium text-gray-900" x-text="detailAccount?.region || '-'"></div>
                        </div>
                        <div>
                            <div class="text-gray-500">时区</div>
                            <div class="font-medium text-gray-900" x-text="detailAccount?.target_timezone || '-'"></div>
                        </div>
                        <div>
                            <div class="text-gray-500">2FA</div>
                            <div class="font-medium text-gray-900" x-text="detailAccount?.totp_secret ? '已配置' : '未配置'"></div>
                        </div>
                        <div>
                            <div class="text-gray-500">创建时间</div>
                            <div class="font-medium text-gray-900" x-text="formatDate(detailAccount?.created_at)"></div>
                        </div>
                        <div class="col-span-2">
                            <div class="text-gray-500">备注</div>
                            <div class="font-medium text-gray-900" x-text="detailAccount?.notes || '-'"></div>
                        </div>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="border border-gray-200 rounded-lg p-4">
                        <div class="text-sm font-semibold text-gray-900 mb-2">绑定代理</div>
                        <div class="text-sm text-gray-700" x-text="detailAccount?.proxy ? `${detailAccount.proxy.host}:${detailAccount.proxy.port}` : '未绑定'"></div>
                        <div class="text-xs text-gray-500" x-text="detailAccount?.proxy?.region || ''"></div>
                    </div>
                    <div class="border border-gray-200 rounded-lg p-4">
                        <div class="text-sm font-semibold text-gray-900 mb-2">绑定窗口</div>
                        <div class="text-sm text-gray-700" x-text="detailAccount?.browser_window?.name || '未绑定'"></div>
                        <div class="text-xs text-gray-500" x-text="detailAccount?.browser_window?.bit_window_id || ''"></div>
                    </div>
                    <div class="border border-gray-200 rounded-lg p-4">
                        <div class="flex items-center justify-between mb-2">
                            <div class="text-sm font-semibold text-gray-900">BM</div>
                            <button x-show="!detailAssets?.bm" @click="openBmBindModal()" class="text-xs text-indigo-600 hover:text-indigo-800">绑定</button>
                        </div>
                        <div x-show="detailAssets?.bm">
                            <div class="text-sm text-gray-700" x-text="detailAssets?.bm?.bm_id || '-'"></div>
                            <div class="text-xs text-gray-500" x-text="detailAssets?.bm?.name || '-'"></div>
                            <div class="text-xs text-gray-500" x-text="detailAssets?.bm?.status || '-'"></div>
                        </div>
                        <div x-show="!detailAssets?.bm" class="text-sm text-gray-500">未绑定 BM</div>
                    </div>
                    <div class="border border-gray-200 rounded-lg p-4">
                        <div class="text-sm font-semibold text-gray-900 mb-2">广告账户</div>
                        <div class="space-y-2">
                            <template x-for="item in detailAssets.ad_accounts" :key="item.ad_account_id">
                                <div class="flex items-center justify-between text-sm bg-gray-50 rounded-md px-3 py-2 cursor-pointer hover:bg-gray-100" @click="goToAdAccount(item)">
                                    <div class="text-gray-700" x-text="item.ad_account_id"></div>
                                    <div class="text-gray-500" x-text="item.spending_limit"></div>
                                    <div class="text-gray-500" x-text="formatCurrency(item.daily_budget)"></div>
                                    <div class="text-gray-500" x-text="item.status"></div>
                                </div>
                            </template>
                            <div x-show="detailAssets.ad_accounts.length === 0" class="text-sm text-gray-500">暂无广告账户</div>
                        </div>
                    </div>
                    <div class="border border-gray-200 rounded-lg p-4">
                        <div class="text-sm font-semibold text-gray-900 mb-2">Fanpage</div>
                        <div class="space-y-2">
                            <template x-for="item in detailAssets.fanpages" :key="item.page_id">
                                <div class="flex items-center justify-between text-sm bg-gray-50 rounded-md px-3 py-2 cursor-pointer hover:bg-gray-100" @click="goToFanpage(item)">
                                    <div class="text-gray-700" x-text="item.page_name"></div>
                                    <div class="text-gray-500" x-text="item.pixel_installed ? '✅' : '❌'"></div>
                                    <div class="text-gray-500" x-text="item.domain_verified ? '✅' : '❌'"></div>
                                </div>
                            </template>
                            <div x-show="detailAssets.fanpages.length === 0" class="text-sm text-gray-500">暂无 Fanpage</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增账号模态框 -->
    <div x-show="showCreateModal" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex items-center justify-center min-h-screen px-4 text-center">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="showCreateModal = false"></div>
            <div class="inline-block w-full max-w-md p-6 my-8 overflow-hidden text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl">
                <h3 class="text-lg font-medium leading-6 text-gray-900 mb-4">新增账号</h3>
                <form @submit.prevent="createAccount">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">用户名</label>
                            <input type="text" x-model="newAccount.username" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">密码</label>
                            <input type="text" x-model="newAccount.password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">邮箱</label>
                            <input type="email" x-model="newAccount.email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">邮箱密码</label>
                            <input type="text" x-model="newAccount.email_password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">地区</label>
                                <input type="text" x-model="newAccount.region" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">目标时区</label>
                                <select x-model="newAccount.target_timezone" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                                    <option value="America/New_York">America/New_York</option>
                                    <option value="America/Los_Angeles">America/Los_Angeles</option>
                                    <option value="Asia/Shanghai">Asia/Shanghai</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">TOTP 密钥 (可选)</label>
                            <input type="text" x-model="newAccount.totp_secret" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">备注</label>
                            <textarea x-model="newAccount.notes" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2"></textarea>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end gap-3">
                        <button type="button" @click="showCreateModal = false" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">取消</button>
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 绑定资源模态框 -->
    <div x-show="showBindModal" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex items-center justify-center min-h-screen px-4 text-center">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="showBindModal = false"></div>
            <div class="inline-block w-full max-w-2xl p-6 my-8 overflow-hidden text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl">
                <h3 class="text-lg font-medium leading-6 text-gray-900 mb-4">绑定资源 - <span x-text="selectedAccount?.username"></span></h3>
                <div class="grid grid-cols-2 gap-6">
                    <!-- 代理列表 -->
                    <div>
                        <h4 class="font-medium text-gray-700 mb-2">选择空闲代理</h4>
                        <div class="border rounded-md h-64 overflow-y-auto p-2 space-y-2">
                            <template x-for="proxy in idleProxies" :key="proxy.id">
                                <div @click="selectedProxyId = proxy.id" :class="{'bg-indigo-50 border-indigo-500': selectedProxyId === proxy.id, 'hover:bg-gray-50': selectedProxyId !== proxy.id}" class="p-2 border rounded cursor-pointer transition">
                                    <div class="text-sm font-medium" x-text="proxy.host + ':' + proxy.port"></div>
                                    <div class="text-xs text-gray-500" x-text="proxy.region || '未知地区'"></div>
                                </div>
                            </template>
                            <div x-show="idleProxies.length === 0" class="text-center text-gray-500 py-4 text-sm">无空闲代理</div>
                        </div>
                    </div>
                    <!-- 窗口列表 -->
                    <div>
                        <h4 class="font-medium text-gray-700 mb-2">选择空闲窗口</h4>
                        <div class="border rounded-md h-64 overflow-y-auto p-2 space-y-2">
                            <template x-for="window in idleWindows" :key="window.id">
                                <div @click="selectedWindowId = window.id" :class="{'bg-indigo-50 border-indigo-500': selectedWindowId === window.id, 'hover:bg-gray-50': selectedWindowId !== window.id}" class="p-2 border rounded cursor-pointer transition">
                                    <div class="text-sm font-medium" x-text="window.name"></div>
                                    <div class="text-xs text-gray-500" x-text="window.bit_window_id"></div>
                                </div>
                            </template>
                            <div x-show="idleWindows.length === 0" class="text-center text-gray-500 py-4 text-sm">无空闲窗口</div>
                        </div>
                    </div>
                </div>
                <div class="mt-6 flex justify-end gap-3">
                    <button type="button" @click="showBindModal = false" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">取消</button>
                    <button type="button" @click="bindResources" :disabled="!selectedProxyId || !selectedWindowId" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed">确认绑定</button>
                </div>
            </div>
        </div>
    </div>
    <div x-show="showBmBindModal" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex items-center justify-center min-h-screen px-4 text-center">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="showBmBindModal = false"></div>
            <div class="inline-block w-full max-w-xl p-6 my-8 overflow-hidden text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-medium leading-6 text-gray-900">绑定 BM</h3>
                    <div class="flex gap-2 text-xs">
                        <button @click="bmBindMode = 'select'" :class="bmBindMode === 'select' ? 'text-indigo-600' : 'text-gray-500'">选择已有</button>
                        <button @click="bmBindMode = 'create'" :class="bmBindMode === 'create' ? 'text-indigo-600' : 'text-gray-500'">新建</button>
                    </div>
                </div>
                <div x-show="bmBindMode === 'select'" class="space-y-3">
                    <select x-model="selectedBmId" class="w-full border-gray-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        <option value="">请选择 BM</option>
                        <template x-for="bm in bmCandidates" :key="bm.id">
                            <option :value="bm.id" x-text="bm.name ? `${bm.name} (${bm.bm_id})` : bm.bm_id"></option>
                        </template>
                    </select>
                    <div class="flex justify-end gap-3">
                        <button type="button" @click="showBmBindModal = false" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">取消</button>
                        <button type="button" @click="bindExistingBm" :disabled="!selectedBmId" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50">确认绑定</button>
                    </div>
                </div>
                <div x-show="bmBindMode === 'create'" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">BM ID</label>
                        <input type="text" x-model="bmCreateForm.bm_id" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">名称</label>
                        <input type="text" x-model="bmCreateForm.name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">地区</label>
                        <input type="text" x-model="bmCreateForm.region" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                    </div>
                    <div class="flex justify-end gap-3">
                        <button type="button" @click="showBmBindModal = false" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">取消</button>
                        <button type="button" @click="createAndBindBm" :disabled="!bmCreateForm.bm_id" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50">创建并绑定</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- 批量导入模态框 -->
    <div x-show="showBatchModal" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex items-center justify-center min-h-screen px-4 text-center">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="showBatchModal = false"></div>
            <div class="inline-block w-full max-w-4xl p-6 my-8 overflow-hidden text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl">
                <h3 class="text-lg font-medium leading-6 text-gray-900 mb-4">批量导入账号</h3>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">每行一个账号，格式：UID:密码:2FA密钥:邮箱:邮箱密码:Cookie:浏览器ProfileID</label>
                    <textarea x-model="batchText" rows="10" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" placeholder="61564195751078:pass:2FA:email:emailpass:CookieString:ProfileID"></textarea>
                </div>
                
                <template x-if="importResult">
                    <div class="mb-4 p-4 bg-gray-50 rounded-md">
                        <p class="text-sm font-medium" :class="{'text-green-600': importResult.fail_count === 0, 'text-red-600': importResult.fail_count > 0}">
                            导入完成：成功 <span x-text="importResult.success_count"></span> 个，失败 <span x-text="importResult.fail_count"></span> 个
                        </p>
                        <template x-if="importResult.errors && importResult.errors.length > 0">
                            <ul class="mt-2 text-xs text-red-500 list-disc list-inside h-32 overflow-y-auto">
                                <template x-for="err in importResult.errors" :key="err.line">
                                    <li x-text="'第 ' + err.line + ' 行: ' + err.reason"></li>
                                </template>
                            </ul>
                        </template>
                    </div>
                </template>

                <div class="mt-6 flex justify-end gap-3">
                    <button type="button" @click="showBatchModal = false" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">关闭</button>
                    <button type="button" @click="batchImport" :disabled="!batchText" class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 disabled:opacity-50">开始导入</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function accountsManager() {
        return {
            accounts: [],
            idleProxies: [],
            idleWindows: [],
            statusFilter: '',
            searchQuery: '',
            showCreateModal: false,
            showBindModal: false,
            showBatchModal: false,
            showDetailPanel: false,
            showBmBindModal: false,
            batchText: '',
            importResult: null,
            selectedAccount: null,
            selectedProxyId: null,
            selectedWindowId: null,
            detailAccount: null,
            detailAssets: { bm: null, ad_accounts: [], fanpages: [] },
            detailLoading: false,
            bmCandidates: [],
            bmBindMode: 'select',
            selectedBmId: '',
            bmCreateForm: { bm_id: '', name: '', region: '' },
            newAccount: {
                username: '',
                password: '',
                email: '',
                email_password: '',
                region: 'US',
                target_timezone: 'America/New_York',
                notes: '',
                totp_secret: ''
            },

            async fetchAccounts() {
                let url = '/api/accounts?';
                if (this.statusFilter) url += `status=${this.statusFilter}&`;
                if (this.searchQuery) url += `q=${this.searchQuery}&`;
                
                try {
                    const res = await fetch(url);
                    this.accounts = await res.json();
                    await this.loadAdAssetsStatus();
                } catch (e) {
                    console.error('Failed to fetch accounts', e);
                }
            },

            async loadAdAssetsStatus() {
                const tasks = this.accounts.map(async (account) => {
                    account.ad_assets_loading = true
                    try {
                        const res = await fetch(`/api/accounts/${account.id}/ad-assets`)
                        if (!res.ok) return
                        const assets = await res.json()
                        account.ad_assets = assets
                        account.ad_assets_loaded = true
                    } catch (e) {
                        console.error('Failed to fetch ad assets', e)
                    } finally {
                        account.ad_assets_loading = false
                    }
                })
                await Promise.all(tasks)
            },

            isAdAssetsLoading(account) {
                return !!account?.ad_assets_loading
            },

            isAdAssetsReady(account) {
                if (!account?.ad_assets_loaded) return false
                const assets = account.ad_assets || {}
                const hasBm = !!assets.bm
                const hasAdAccounts = Array.isArray(assets.ad_accounts) && assets.ad_accounts.length > 0
                const hasFanpages = Array.isArray(assets.fanpages) && assets.fanpages.length > 0
                return hasBm && hasAdAccounts && hasFanpages
            },

            getAdAssetsMissingLabel(account) {
                if (!account?.ad_assets_loaded) return 'BM/广告账户/Fanpage'
                const assets = account.ad_assets || {}
                const missing = []
                if (!assets.bm) missing.push('BM')
                if (!Array.isArray(assets.ad_accounts) || assets.ad_accounts.length === 0) missing.push('广告账户')
                if (!Array.isArray(assets.fanpages) || assets.fanpages.length === 0) missing.push('Fanpage')
                return missing.join('/')
            },

            exportAccounts() {
                const params = new URLSearchParams()
                if (this.statusFilter) params.append('status', this.statusFilter)
                if (this.searchQuery) params.append('q', this.searchQuery)
                window.location.href = `/api/accounts/export?${params.toString()}`
            },

            async fetchIdleResources() {
                try {
                    const [proxiesRes, windowsRes] = await Promise.all([
                        fetch('/api/proxies?status=空闲'),
                        fetch('/api/browser-windows?status=空闲')
                    ]);
                    this.idleProxies = await proxiesRes.json();
                    this.idleWindows = await windowsRes.json();
                } catch (e) {
                    console.error('Failed to fetch resources', e);
                }
            },

            getStatusColor(status) {
                const colors = {
                    '待养号': 'bg-blue-500',
                    '养号中': 'bg-yellow-500',
                    '养号就绪': 'bg-green-500',
                    '投放养号中': 'bg-green-600',
                    '异常': 'bg-orange-500',
                    '已封禁': 'bg-red-600'
                };
                return colors[status] || 'bg-gray-500';
            },

            formatDate(dateStr) {
                if (!dateStr) return '从未';
                const date = new Date(dateStr);
                return date.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            },

            formatCurrency(cents) {
                if (cents === null || cents === undefined) return '-'
                return `$${(Number(cents) / 100).toFixed(2)}`
            },

            async openDetailPanel(account) {
                this.detailAccount = account
                this.detailAssets = { bm: null, ad_accounts: [], fanpages: [] }
                this.detailLoading = true
                this.showDetailPanel = true
                const assets = await this.fetchAccountAdAssets(account.id)
                if (assets) this.detailAssets = assets
                this.detailLoading = false
            },

            closeDetailPanel() {
                this.showDetailPanel = false
            },

            async fetchAccountAdAssets(accountId) {
                try {
                    const res = await fetch(`/api/accounts/${accountId}/ad-assets`)
                    if (!res.ok) return null
                    const assets = await res.json()
                    const targetAccount = this.accounts.find(item => item.id === accountId)
                    if (targetAccount) {
                        targetAccount.ad_assets = assets
                        targetAccount.ad_assets_loaded = true
                        targetAccount.ad_assets_loading = false
                    }
                    return assets
                } catch (e) {
                    console.error('Failed to fetch ad assets', e)
                    return null
                }
            },

            goToAdAccount(item) {
                window.location.href = `/ads?ad_account_id=${encodeURIComponent(item.ad_account_id)}`
            },

            goToFanpage(item) {
                if (!this.detailAccount) return
                window.location.href = `/ads?tab=fanpages&fb_account_id=${encodeURIComponent(this.detailAccount.id)}`
            },

            async openBmBindModal() {
                this.bmBindMode = 'select'
                this.selectedBmId = ''
                this.bmCreateForm = { bm_id: '', name: '', region: '' }
                this.showBmBindModal = true
                await this.fetchBmCandidates()
            },

            async fetchBmCandidates() {
                try {
                    const res = await fetch('/api/bm')
                    if (!res.ok) return
                    this.bmCandidates = await res.json()
                } catch (e) {
                    console.error('Failed to fetch BM list', e)
                }
            },

            async bindExistingBm() {
                if (!this.selectedBmId || !this.detailAccount) return
                try {
                    const res = await fetch(`/api/bm/${this.selectedBmId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fb_account_id: this.detailAccount.id })
                    })
                    if (!res.ok) throw new Error('绑定失败')
                    this.showBmBindModal = false
                    const assets = await this.fetchAccountAdAssets(this.detailAccount.id)
                    if (assets) this.detailAssets = assets
                } catch (e) {
                    alert(e.message || '绑定失败')
                }
            },

            async createAndBindBm() {
                if (!this.detailAccount || !this.bmCreateForm.bm_id) return
                try {
                    const res = await fetch('/api/bm', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            bm_id: this.bmCreateForm.bm_id,
                            name: this.bmCreateForm.name,
                            region: this.bmCreateForm.region,
                            fb_account_id: this.detailAccount.id
                        })
                    })
                    if (!res.ok) throw new Error('创建失败')
                    this.showBmBindModal = false
                    const assets = await this.fetchAccountAdAssets(this.detailAccount.id)
                    if (assets) this.detailAssets = assets
                } catch (e) {
                    alert(e.message || '创建失败')
                }
            },

            openCreateModal() {
                this.newAccount = {
                    username: '',
                    password: '',
                    email: '',
                    email_password: '',
                    region: 'US',
                    target_timezone: 'America/New_York',
                    notes: '',
                    totp_secret: ''
                };
                this.showCreateModal = true;
            },

            async createAccount() {
                try {
                    const res = await fetch('/api/accounts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.newAccount)
                    });
                    if (res.ok) {
                        this.showCreateModal = false;
                        this.fetchAccounts();
                    } else {
                        alert('创建失败');
                    }
                } catch (e) {
                    console.error(e);
                    alert('创建出错');
                }
            },

            openBatchModal() {
                this.batchText = '';
                this.importResult = null;
                this.showBatchModal = true;
            },

            async batchImport() {
                try {
                    const res = await fetch('/api/accounts/batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ raw_text: this.batchText })
                    });
                    this.importResult = await res.json();
                    if (this.importResult.success_count > 0) {
                        this.fetchAccounts();
                    }
                } catch (e) {
                    console.error(e);
                    alert('导入出错');
                }
            },

            async updateStatus(id, newStatus) {
                if (newStatus === '已封禁' && !confirm('确认将此账号标记为封禁吗？这将永久禁用关联的代理和窗口！')) {
                    return;
                }
                try {
                    const res = await fetch(`/api/accounts/${id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                    if (res.ok) {
                        this.fetchAccounts();
                    }
                } catch (e) {
                    console.error(e);
                }
            },

            async deleteAccount(id) {
                if (!confirm('确认删除此账号吗？')) return;
                try {
                    const res = await fetch(`/api/accounts/${id}`, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        this.fetchAccounts();
                    }
                } catch (e) {
                    console.error(e);
                }
            },

            openBindModal(account) {
                this.selectedAccount = account;
                this.selectedProxyId = null;
                this.selectedWindowId = null;
                this.fetchIdleResources();
                this.showBindModal = true;
            },

            async bindResources() {
                if (!this.selectedProxyId || !this.selectedWindowId) return;
                try {
                    const res = await fetch(`/api/accounts/${this.selectedAccount.id}/bind`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            proxy_id: this.selectedProxyId,
                            window_id: this.selectedWindowId
                        })
                    });
                    if (res.ok) {
                        this.showBindModal = false;
                        this.fetchAccounts();
                    } else {
                        const err = await res.json();
                        alert('绑定失败: ' + err.detail);
                    }
                } catch (e) {
                    console.error(e);
                    alert('绑定出错');
                }
            }
        }
    }
</script>
{% endblock %}
