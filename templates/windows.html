{% extends "base.html" %}

{% block content %}
<div x-data="windowsManager()" x-init="fetchWindows()" class="space-y-6">
    <!-- Top Toolbar -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-lg shadow-sm">
        <div class="flex items-center gap-4 w-full sm:w-auto">
            <button @click="syncWindows()" :disabled="syncing" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg x-show="!syncing" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                <svg x-show="syncing" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span x-text="syncing ? '\u540c\u6b65\u4e2d...' : '\u540c\u6b65\u7a97\u53e3\u5217\u8868'"></span>
            </button>
        </div>
        <!-- 搜索/筛选暂未要求，预留位置 -->
    </div>

    <!-- 窗口列表表格 -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
        <tr>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">&#29366;&#24577;</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">&#31383;&#21475; ID</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">&#31383;&#21475;&#21517;&#31216;</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">&#32465;&#23450;&#20195;&#29702; IP</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">&#36134;&#21495;</th>
            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">&#25805;&#20316;</th>
        </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
        <template x-for="window in windows" :key="window.id">
            <tr :class="{'bg-red-50': window.status === '\u6c38\u4e45\u7981\u7528', 'bg-gray-50': window.status === '\u5df2\u5931\u8054'}">
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="flex items-center gap-2">
                        <span :class="window.is_running ? 'bg-green-500' : 'bg-gray-300'"
                              class="inline-block w-2 h-2 rounded-full"
                              :title="window.is_running ? '\u8fd0\u884c\u4e2d' : '\u672a\u8fd0\u884c'"></span>
                        <span :class="getStatusColor(window.status)" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-opacity-10" x-text="window.status"></span>
                        <span x-show="window.status === '\u6c38\u4e45\u7981\u7528'" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-600 text-white" x-text="'\u7981\u7528'"></span>
                    </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono" x-text="window.bit_window_id"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                    <div x-text="window.name"></div>
                    <div x-show="window.remark" class="text-xs text-gray-500" x-text="window.remark"></div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" :class="window.proxy_mismatch ? 'bg-yellow-100' : ''">
                    <template x-if="window.synced_proxy">
                        <span>
                            <span x-text="window.synced_proxy"></span>
                            <template x-if="window.proxy_mismatch">
                                <span class="text-yellow-600 ml-1" :title="'\u26a0\ufe0f \u6bd4\u7279\u6d4f\u89c8\u5668\u4ee3\u7406\u4e0e\u672c\u5730\u8bb0\u5f55\u4e0d\u4e00\u81f4'" x-text="'\u26a0\ufe0f'"></span>
                            </template>
                        </span>
                    </template>
                    <template x-if="!window.synced_proxy">
                        <span class="text-gray-400" x-text="'\u672a\u914d\u7f6e'"></span>
                    </template>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                    <template x-if="window.bound_account">
                        <a :href="'/accounts?id=' + window.bound_account.id"
                           class="text-blue-600 hover:underline"
                           x-text="window.bound_account.username"></a>
                    </template>
                    <template x-if="!window.bound_account && window.synced_username">
                        <span class="text-gray-500" x-text="window.synced_username + ' (\u672a\u7ed1\u5b9a)'"></span>
                    </template>
                    <template x-if="!window.bound_account && !window.synced_username">
                        <span class="text-gray-400">-</span>
                    </template>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                    <button @click="openWindow(window)" class="text-indigo-600 hover:text-indigo-900 mr-3 disabled:opacity-50 disabled:cursor-not-allowed" :disabled="processing.has(window.id) || window.status === '\u6c38\u4e45\u7981\u7528'" :title="window.status === '\u6c38\u4e45\u7981\u7528' ? '\u5df2\u6c38\u4e45\u7981\u7528' : ''">
                        <span x-show="!processing.has(window.id)" x-text="'\u6253\u5f00'"></span>
                        <span x-show="processing.has(window.id)">...</span>
                    </button>
                    <button x-show="window.status !== '\u6c38\u4e45\u7981\u7528'" @click="closeWindow(window)" class="text-yellow-600 hover:text-yellow-900 mr-3 disabled:opacity-50 disabled:cursor-not-allowed" :disabled="processing.has(window.id)">
                        <span x-show="!processing.has(window.id)" x-text="'\u5173\u95ed'"></span>
                        <span x-show="processing.has(window.id)">...</span>
                    </button>
                    <button x-show="window.status !== '\u6c38\u4e45\u7981\u7528'" @click="disableWindow(window)" class="text-red-700 hover:text-red-900 mr-3 disabled:opacity-50 disabled:cursor-not-allowed" :disabled="processing.has(window.id)">
                        <span x-show="!processing.has(window.id)" x-text="'\u7981\u7528'"></span>
                        <span x-show="processing.has(window.id)">...</span>
                    </button>
                    <button @click="deleteWindow(window)" class="text-red-600 hover:text-red-900 disabled:opacity-50 disabled:cursor-not-allowed" :disabled="processing.has(window.id)">
                        <span x-show="!processing.has(window.id)" x-text="'\u5220\u9664'"></span>
                        <span x-show="processing.has(window.id)">...</span>
                    </button>
                </td>
            </tr>
        </template>
        <tr x-show="windows.length === 0">
            <td colspan="6" class="px-6 py-4 text-center text-sm text-gray-500" x-text="'\u6682\u65e0\u7a97\u53e3\u6570\u636e\uff0c\u8bf7\u70b9\u51fb\u540c\u6b65\u6309\u94ae'"></td>
        </tr>
    </tbody>
</table>
    </div>
</div>

<script>
    function windowsManager() {
        return {
            windows: [],
            syncing: false,
            processing: new Set(), // Track processing state by window ID

            async fetchWindows() {
                try {
                    const response = await fetch('/api/windows');
                    if (response.ok) {
                        this.windows = await response.json();
                    }
                } catch (error) {
                    console.error('Error fetching windows:', error);
                }
            },

            async syncWindows() {
                this.syncing = true;
                try {
                    const response = await fetch('/api/windows/sync', { method: 'POST' });
                    const result = await response.json();
                    
                    if (response.ok) {
                        let r = result.data || {};
                        let msg = `\u540c\u6b65\u6210\u529f\uff01\u540c\u6b65 ${r.synced_count} \u4e2a`;
                        if (r.new_count) msg += `\uff0c\u65b0\u589e ${r.new_count} \u4e2a`;
                        if (r.lost_count) msg += `\uff0c\u5df2\u5931\u8054 ${r.lost_count} \u4e2a`;
                        if (r.auto_bound_count) msg += `\uff0c\u81ea\u52a8\u7ed1\u5b9a ${r.auto_bound_count} \u4e2a`;
                        alert(msg);
                        this.fetchWindows();
                    } else {
                        // 失败
                        alert('\u540c\u6b65\u5931\u8d25: ' + (result.detail || result.msg || '\u672a\u77e5\u9519\u8bef'));
                    }
                } catch (error) {
                    console.error('Sync error:', error);
                    alert('\u540c\u6b65\u8bf7\u6c42\u5931\u8d25');
                } finally {
                    this.syncing = false;
                }
            },

            async openWindow(window) {
                if (this.processing.has(window.id)) return;
                
                // Add to processing set
                this.processing.add(window.id);
                // Force reactivity since Set isn't automatically reactive in Alpine v2/v3 without wrapper
                this.processing = new Set(this.processing);
                
                try {
                    const response = await fetch(`/api/windows/${window.id}/open`, { method: 'POST' });
                    const result = await response.json();
                    
                    if (response.ok) {
                        console.log('Window opened:', result);
                        this.fetchWindows();
                    } else {
                        alert('\u6253\u5f00\u5931\u8d25: ' + (result.detail || '\u672a\u77e5\u9519\u8bef'));
                    }
                } catch (error) {
                    console.error('Open error:', error);
                    alert('\u8bf7\u6c42\u5931\u8d25');
                } finally {
                    this.processing.delete(window.id);
                    this.processing = new Set(this.processing);
                }
            },

            async closeWindow(window) {
                this.processing.add(window.id);
                this.processing = new Set(this.processing);
                try {
                    const response = await fetch(`/api/windows/${window.id}/close`, { method: 'POST' });
                    const result = await response.json();
                    
                    if (response.ok) {
                        this.fetchWindows();
                    } else {
                        alert('\u5173\u95ed\u5931\u8d25: ' + (result.detail || '\u672a\u77e5\u9519\u8bef'));
                    }
                } catch (error) {
                    console.error('Close error:', error);
                    alert('\u5173\u95ed\u8bf7\u6c42\u5931\u8d25');
                } finally {
                    this.processing.delete(window.id);
                    this.processing = new Set(this.processing);
                }
            },

            async disableWindow(window) {
                const confirmed = confirm(
                    '\u2757 \u786e\u8ba4\u6c38\u4e45\u7981\u7528\u6b64\u7a97\u53e3\uff1f\n\n' +
                    '\u8fd9\u5c06\u540c\u65f6\uff1a\n' +
                    '\u2022 \u5c01\u7981\u7ed1\u5b9a\u7684 FB \u8d26\u53f7\n' +
                    '\u2022 \u7981\u7528\u7ed1\u5b9a\u7684\u4ee3\u7406 IP\n\n' +
                    '\u6b64\u64cd\u4f5c\u4e0d\u53ef\u64a4\u9500\uff01'
                );
                if (!confirmed) return;

                this.processing.add(window.id);
                this.processing = new Set(this.processing);
                try {
                    const response = await fetch(`/api/windows/${window.id}/status`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: '\u6c38\u4e45\u7981\u7528' })
                    });
                    const result = await response.json().catch(() => ({}));

                    if (response.ok) {
                        this.fetchWindows();
                        if (result.cascade) {
                            showToast(
                                `\u7ea7\u8054\u64cd\u4f5c\u5b8c\u6210\uff1a\u8d26\u53f7 ${result.cascade.account || '-'} \u5df2\u5c01\u7981\uff0c\u4ee3\u7406 ${result.cascade.proxy || '-'} \u5df2\u7981\u7528`,
                                'warn'
                            );
                        }
                    } else {
                        alert('\u7981\u7528\u5931\u8d25: ' + (result.detail || '\u672a\u77e5\u9519\u8bef'));
                    }
                } catch (error) {
                    console.error('Disable error:', error);
                    alert('\u7981\u7528\u8bf7\u6c42\u5931\u8d25');
                } finally {
                    this.processing.delete(window.id);
                    this.processing = new Set(this.processing);
                }
            },

            async deleteWindow(window) {
                if (!confirm(`\u786e\u5b9a\u5220\u9664\u8be5\u7a97\u53e3\u8bb0\u5f55 ${window.name} (${window.bit_window_id}) \uff1f`)) {
                    return;
                }
                this.processing.add(window.id);
                this.processing = new Set(this.processing);
                try {
                    const response = await fetch(`/api/windows/${window.id}`, { method: 'DELETE' });
                    if (response.ok) {
                        this.fetchWindows();
                    } else {
                        // Check if response has content before parsing JSON
                        const text = await response.text();
                        let data = {};
                        try {
                            data = JSON.parse(text);
                        } catch (e) {
                            // If not JSON, use text or default message
                        }
                        alert('\u5220\u9664\u5931\u8d25: ' + (data.detail || '\u672a\u77e5\u9519\u8bef'));
                    }
                } catch (error) {
                    console.error('Delete error:', error);
                    alert('\u5220\u9664\u8bf7\u6c42\u5931\u8d25');
                } finally {
                    this.processing.delete(window.id);
                    this.processing = new Set(this.processing);
                }
            },

            getStatusColor(status) {
                switch(status) {
                    case '\u7a7a\u95f2': return 'text-green-800 bg-green-100';
                    case '\u4f7f\u7528\u4e2d': return 'text-blue-800 bg-blue-100';
                    case '\u8fd0\u884c\u4e2d': return 'text-emerald-800 bg-emerald-100';
                    case '\u5f02\u5e38': return 'text-yellow-800 bg-yellow-100';
                    case '\u6c38\u4e45\u7981\u7528': return 'text-red-800 bg-red-100';
                    case '\u5df2\u5931\u8054': return 'text-orange-800 bg-orange-100';
                    default: return 'text-gray-800 bg-gray-100';
                }
            }
        }
    }
</script>
{% endblock %}
