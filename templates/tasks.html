{% extends "base.html" %}

{% block content %}
<div x-data="tasksManagement()" x-init="init()" class="space-y-6">
    <!-- 顶部控制栏 -->
    <div class="bg-white rounded-lg shadow px-6 py-4 flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
        <div>
            <h2 class="text-xl font-bold text-gray-800">养号任务管理</h2>
            <p class="text-sm text-gray-500 mt-1">管理和监控每日养号任务执行情况</p>
        </div>
        
        <div class="flex items-center space-x-6">
            <!-- 调度器状态 -->
            <div class="flex items-center space-x-2 bg-gray-50 px-4 py-2 rounded-lg border border-gray-200">
                <span class="text-sm font-medium text-gray-700">调度器状态:</span>
                <div class="flex items-center space-x-2">
                    <div class="w-3 h-3 rounded-full" 
                         :class="schedulerStatus.running && !schedulerStatus.paused ? 'bg-green-500 animate-pulse' : 'bg-red-500'"></div>
                    <span class="text-sm font-bold" 
                          :class="schedulerStatus.running && !schedulerStatus.paused ? 'text-green-600' : 'text-red-600'"
                          x-text="getSchedulerStatusText()"></span>
                </div>
            </div>

            <!-- 控制按钮 -->
            <button @click="toggleScheduler()" 
                    class="px-4 py-2 rounded text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2"
                    :class="schedulerStatus.paused ? 'bg-green-600 hover:bg-green-700 text-white focus:ring-green-500' : 'bg-yellow-500 hover:bg-yellow-600 text-white focus:ring-yellow-500'">
                <span x-text="schedulerStatus.paused ? '恢复调度' : '暂停调度'"></span>
            </button>
        </div>
    </div>

    <!-- 筛选工具栏 -->
    <div class="bg-white rounded-lg shadow p-4 flex flex-wrap gap-4 items-center">
        <!-- 日期选择 -->
        <div class="flex items-center space-x-2">
            <label class="text-sm font-medium text-gray-700">日期:</label>
            <input type="date" x-model="filters.date" @change="loadTasks()" 
                   class="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>

        <!-- 账号筛选 -->
        <div class="flex items-center space-x-2">
            <label class="text-sm font-medium text-gray-700">账号ID:</label>
            <input type="text" x-model="filters.accountId" placeholder="输入账号ID"
                   class="w-32 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>

        <!-- 状态筛选 -->
        <div class="flex items-center space-x-2">
            <label class="text-sm font-medium text-gray-700">状态:</label>
            <select x-model="filters.status" 
                    class="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                <option value="">全部</option>
                <option value="pending">待执行</option>
                <option value="running">执行中</option>
                <option value="completed">已完成</option>
                <option value="failed">失败</option>
            </select>
        </div>

        <button @click="loadTasks()" class="ml-auto px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            刷新列表
        </button>
    </div>

    <!-- 任务列表 -->
    <div class="bg-white shadow overflow-hidden rounded-lg">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">账号</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Day N</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">任务内容</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">计划时间</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <template x-for="task in filteredTasks" :key="task.id">
                        <tr :class="{'bg-yellow-50': task.execution_type === 'manual' && task.status === 'pending'}">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="task.id"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-indigo-600">
                                <a :href="'/accounts?id=' + task.fb_account_id" x-text="'Account ' + task.fb_account_id"></a>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="'Day ' + task.day_number"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="task.action"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex space-x-1">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                          :class="task.execution_type === 'auto' ? 'bg-blue-100 text-blue-800' : 'bg-purple-100 text-purple-800'"
                                          x-text="task.execution_type === 'auto' ? '🤖 自动' : '✋ 人工'">
                                    </span>
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800"
                                          x-text="task.task_type === 'once' ? '一次性' : '🔄 每日'">
                                    </span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                      :class="{
                                          'bg-green-100 text-green-800': task.status === 'completed',
                                          'bg-red-100 text-red-800': task.status === 'failed',
                                          'bg-yellow-100 text-yellow-800': task.status === 'pending',
                                          'bg-blue-100 text-blue-800': task.status === 'running'
                                      }"
                                      x-text="formatStatus(task.status)">
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                <div x-text="formatDate(task.scheduled_time)"></div>
                                <div x-show="task.executed_at" class="text-xs text-gray-400 mt-1" x-text="'执行于: ' + formatDate(task.executed_at)"></div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                <template x-if="task.execution_type === 'manual' && task.status === 'pending'">
                                    <button @click="completeTask(task.id)" class="text-indigo-600 hover:text-indigo-900 bg-indigo-50 px-3 py-1 rounded border border-indigo-200 shadow-sm hover:bg-indigo-100">
                                        确认完成
                                    </button>
                                </template>
                                <template x-if="task.execution_type === 'auto' && task.status === 'pending'">
                                    <button @click="runTaskNow(task.fb_account_id)" class="text-gray-400 hover:text-gray-600" title="立即触发账号任务">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                        </svg>
                                    </button>
                                </template>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="filteredTasks.length === 0">
                        <td colspan="8" class="px-6 py-4 text-center text-sm text-gray-500">
                            暂无符合条件的任务
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function tasksManagement() {
        return {
            tasks: [],
            schedulerStatus: { running: false, paused: false, next_run_generate: null },
            filters: {
                date: new Date().toISOString().split('T')[0],
                accountId: '',
                status: ''
            },
            
            init() {
                this.loadSchedulerStatus();
                this.loadTasks();
                
                // 自动刷新状态
                setInterval(() => {
                    this.loadSchedulerStatus();
                }, 30000);
            },
            
            async loadSchedulerStatus() {
                try {
                    const res = await fetch('/api/scheduler/status');
                    if (res.ok) {
                        this.schedulerStatus = await res.json();
                    }
                } catch (e) {
                    console.error('Failed to load scheduler status', e);
                }
            },
            
            async loadTasks() {
                try {
                    const params = new URLSearchParams({ date: this.filters.date });
                    const res = await fetch(`/api/tasks/today?${params}`);
                    if (res.ok) {
                        this.tasks = await res.json();
                    }
                } catch (e) {
                    console.error('Failed to load tasks', e);
                }
            },
            
            get filteredTasks() {
                return this.tasks.filter(task => {
                    const matchAccount = !this.filters.accountId || String(task.fb_account_id).includes(this.filters.accountId);
                    const matchStatus = !this.filters.status || task.status === this.filters.status;
                    return matchAccount && matchStatus;
                });
            },
            
            getSchedulerStatusText() {
                if (this.schedulerStatus.paused) return '已暂停';
                if (this.schedulerStatus.running) return '运行中';
                return '已停止';
            },
            
            async toggleScheduler() {
                const action = this.schedulerStatus.paused ? 'resume' : 'pause';
                try {
                    const res = await fetch(`/api/scheduler/${action}`, { method: 'POST' });
                    if (res.ok) {
                        await this.loadSchedulerStatus();
                        // Show toast or alert?
                    }
                } catch (e) {
                    console.error(`Failed to ${action} scheduler`, e);
                }
            },
            
            async completeTask(taskId) {
                if (!confirm('确认该人工任务已完成？')) return;
                
                try {
                    const res = await fetch(`/api/tasks/${taskId}/complete`, { method: 'POST' });
                    if (res.ok) {
                        this.loadTasks(); // Refresh list
                    } else {
                        alert('操作失败');
                    }
                } catch (e) {
                    console.error('Failed to complete task', e);
                }
            },

            async runTaskNow(accountId) {
                if (!confirm(`确定要立即触发账号 ${accountId} 的任务吗？`)) return;
                try {
                    const res = await fetch(`/api/tasks/${accountId}/run`, { method: 'POST' });
                    if (res.ok) {
                        alert('任务触发成功，请稍后刷新查看状态');
                        setTimeout(() => this.loadTasks(), 2000);
                    }
                } catch (e) {
                    console.error('Failed to run tasks', e);
                }
            },
            
            formatDate(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return date.toLocaleString('zh-CN', { hour12: false });
            },
            
            formatStatus(status) {
                const map = {
                    'pending': '待执行',
                    'running': '执行中',
                    'completed': '已完成',
                    'failed': '失败'
                };
                return map[status] || status;
            }
        }
    }
</script>
{% endblock %}
