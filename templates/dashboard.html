{% extends "base.html" %}

{% block content %}
<div x-data="dashboard()" x-init="init()">
    <!-- 系统操作栏 -->
    <div class="flex justify-end mb-4">
        <button @click="backupSystem()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded inline-flex items-center">
            <svg class="fill-current w-4 h-4 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M13 8V2H7v6H2l8 8 8-8h-5zM0 18h20v2H0v-2z"/></svg>
            <span>💾 立即备份</span>
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-gray-500 text-sm font-medium">账号总数</h3>
            <div class="mt-3 grid grid-cols-2 gap-3">
                 <template x-for="config in accountStatusConfig" :key="config.key">
                    <a class="bg-gray-50 p-2 rounded block hover:bg-gray-100"
                       :href="`/accounts?status=${encodeURIComponent(config.key)}`">
                        <div class="text-xl font-bold" :class="config.color" x-text="stats.account_stats[config.key] || 0"></div>
                        <div class="text-xs text-gray-500" x-text="config.label"></div>
                    </a>
                 </template>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-gray-500 text-sm font-medium">今日任务</h3>
            <div class="mt-2 flex justify-between items-end">
                <div>
                    <div class="text-3xl font-bold text-gray-800" x-text="stats.task_stats.total || 0"></div>
                    <div class="text-xs text-gray-500">总任务数</div>
                </div>
                <div class="text-right text-sm">
                    <div class="text-green-600">完成: <span x-text="stats.task_stats.completed || 0"></span></div>
                    <div class="text-red-600">失败: <span x-text="stats.task_stats.failed || 0"></span></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex items-center justify-between">
            <div>
                <h3 class="text-gray-500 text-sm font-medium">活跃 RPA 进程</h3>
                <div class="mt-2 text-3xl font-bold text-blue-600">
                    <span x-text="stats.active_rpa_count || 0"></span>
                    <span class="text-sm text-gray-500">/</span>
                    <span class="text-sm text-gray-500" x-text="schedulerStatus.max_concurrent_windows || 0"></span>
                </div>
                <div class="text-xs text-gray-500">当前活跃 / 最大并发</div>
            </div>
            <div class="p-3 rounded-full bg-blue-100 text-blue-600">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6 flex items-center justify-between">
            <div>
                <h3 class="text-gray-500 text-sm font-medium">未处理告警</h3>
                <div class="mt-2 text-3xl font-bold text-red-600" x-text="alertCounts.error + alertCounts.critical"></div>
                <div class="text-xs text-gray-500">ERROR + CRITICAL</div>
            </div>
            <div class="p-3 rounded-full bg-red-100 text-red-600">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
        <!-- 左侧：今日任务执行进度表格 -->
        <div class="lg:col-span-2 bg-white rounded-lg shadow overflow-hidden flex flex-col h-96">
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                <h3 class="text-lg font-medium text-gray-900">今日任务执行进度</h3>
            </div>
            <div class="flex-grow overflow-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50 sticky top-0">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">任务ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">账号ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">执行时间</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="task in todayTasks" :key="task.id">
                            <tr>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="task.id"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="task.fb_account_id"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="task.task_type"></td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                          :class="{
                                              'bg-green-100 text-green-800': task.status === 'completed',
                                              'bg-red-100 text-red-800': task.status === 'failed',
                                              'bg-yellow-100 text-yellow-800': task.status === 'pending',
                                              'bg-blue-100 text-blue-800': task.status === 'running'
                                          }"
                                          x-text="task.status">
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(task.executed_at)"></td>
                            </tr>
                        </template>
                        <tr x-show="todayTasks.length === 0">
                            <td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500">今日暂无任务</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 右侧：异常告警列表 -->
        <div class="bg-white rounded-lg shadow overflow-hidden flex flex-col h-96">
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                <h3 class="text-lg font-medium text-gray-900">异常告警</h3>
                <span class="text-xs text-gray-500" x-text="'共 ' + alerts.length + ' 条'"></span>
            </div>
            <div class="flex-grow overflow-auto">
                <table class="min-w-full divide-y divide-gray-200 text-sm">
                    <thead class="bg-gray-50 sticky top-0">
                        <tr>
                            <th class="px-4 py-2 text-left font-medium text-gray-500">时间</th>
                            <th class="px-4 py-2 text-left font-medium text-gray-500">账号名</th>
                            <th class="px-4 py-2 text-left font-medium text-gray-500">级别</th>
                            <th class="px-4 py-2 text-left font-medium text-gray-500">告警内容</th>
                            <th class="px-4 py-2 text-right font-medium text-gray-500">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <template x-for="alert in alerts" :key="alert.id">
                            <template>
                                <tr x-show="!dismissedAlertIds.has(alert.id)" x-transition.opacity.duration.300ms
                                    :class="getAlertRowClass(alert)">
                                    <td class="px-4 py-2 whitespace-nowrap text-gray-600" x-text="formatDate(alert.created_at)"></td>
                                    <td class="px-4 py-2 text-gray-700" x-text="alert.account_username || '-'"></td>
                                    <td class="px-4 py-2">
                                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                              :class="getAlertBadgeClass(alert)">
                                            <span x-text="alert.level"></span>
                                        </span>
                                    </td>
                                    <td class="px-4 py-2 text-gray-800">
                                        <div class="font-medium" x-text="alert.title"></div>
                                    </td>
                                    <td class="px-4 py-2 text-right space-x-2">
                                        <button class="text-indigo-600 hover:text-indigo-800" @click="toggleAlertDetail(alert.id)">查看详情</button>
                                        <button class="text-gray-500 hover:text-gray-700" @click="dismissAlert(alert.id)">关闭</button>
                                    </td>
                                </tr>
                                <tr x-show="expandedAlertId === alert.id && !dismissedAlertIds.has(alert.id)" class="bg-white">
                                    <td colspan="5" class="px-4 py-3 text-gray-700 break-all" x-text="alert.message"></td>
                                </tr>
                            </template>
                        </template>
                        <tr x-show="alerts.length === 0">
                            <td colspan="5" class="px-6 py-6 text-center text-gray-500">暂无未处理告警</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- 底部：人工待办卡片区 -->
     <div class="mb-6">
        <h3 class="text-lg font-medium text-gray-900 mb-4" x-show="manualTasks.length > 0">人工待办任务</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <template x-for="task in manualTasks" :key="task.id">
                <div class="rounded-lg shadow p-4 relative" :class="getManualCardClass(task)">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-gray-800">人工待办</h4>
                        <span class="text-xs text-gray-600 bg-white/70 px-2 py-1 rounded">ID: <span x-text="task.id"></span></span>
                    </div>
                    <p class="text-sm text-gray-700 mb-2">账号ID: <span x-text="task.fb_account_id"></span></p>
                    <p class="text-sm text-gray-700 mb-2">类型: <span x-text="task.task_type"></span></p>
                    <p class="text-xs mb-4" :class="getManualTimeoutTextClass(task)" x-text="getManualTimeoutLabel(task) || '状态正常'"></p>
                    <button class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-150 ease-in-out"
                            @click="completeTask(task.id)">
                        确认完成
                    </button>
                </div>
            </template>
        </div>
     </div>
</div>

<script>
function dashboard() {
    return {
        stats: {
            account_stats: {},
            task_stats: {},
            active_rpa_count: 0,
            alert_count: 0
        },
        alerts: [],
        todayTasks: [], 
        schedulerStatus: { running: false, paused: false, next_run_generate: null, max_concurrent_windows: 0 },
        alertCounts: { total: 0, error: 0, critical: 0 },
        lastAlertId: null,
        expandedAlertId: null,
        dismissedAlertIds: new Set(),
        accountStatusConfig: [
            { key: '待养号', label: '待养号', color: 'text-blue-600' },
            { key: '养号中', label: '养号中', color: 'text-yellow-600' },
            { key: '养号就绪', label: '养号就绪', color: 'text-green-600' },
            { key: '投放养号中', label: '投放养号中✨', color: 'text-green-600' },
            { key: '异常', label: '异常', color: 'text-orange-600' },
            { key: '已封禁', label: '已封禁', color: 'text-red-600' }
        ],
        
        get manualTasks() {
            return this.todayTasks.filter(t => t.execution_type === 'manual' && t.status === 'pending');
        },

        init() {
            this.fetchAll();
            setInterval(() => {
                this.fetchRealtime();
            }, 30000); // 30秒自动刷新
        },
        
        fetchAll() {
            this.fetchStats();
            this.fetchAlertCounts();
            this.fetchSchedulerStatus();
            this.fetchAlerts();
            this.fetchTodayTasks();
        },
        fetchRealtime() {
            this.fetchAlertCounts();
            this.fetchSchedulerStatus();
            this.fetchAlerts();
            this.fetchTodayTasks();
        },

        async fetchStats() {
            try {
                const res = await fetch('/api/dashboard/stats');
                if (res.ok) this.stats = await res.json();
            } catch (e) { console.error(e); }
        },
        async fetchAlerts() {
            try {
                const res = await fetch('/api/alerts');
                if (res.ok) {
                    const data = await res.json();
                    this.alerts = data;
                    this.checkAlertToast();
                }
            } catch (e) { console.error(e); }
        },
        async fetchAlertCounts() {
            try {
                const res = await fetch('/api/alerts/count');
                if (res.ok) this.alertCounts = await res.json();
            } catch (e) { console.error(e); }
        },
        async fetchSchedulerStatus() {
            try {
                const res = await fetch('/api/scheduler/status');
                if (res.ok) this.schedulerStatus = await res.json();
            } catch (e) { console.error(e); }
        },
        async fetchTodayTasks() {
            try {
                const params = new URLSearchParams({ date: this.getTodayDate() });
                const res = await fetch(`/api/tasks/today?${params.toString()}`);
                if (res.ok) {
                    this.todayTasks = await res.json();
                    this.showManualTimeoutToast();
                }
            } catch (e) { console.error(e); }
        },
        async dismissAlert(id) {
            try {
                const res = await fetch(`/api/alerts/${id}/dismiss`, { method: 'POST' });
                if (res.ok) {
                    this.dismissedAlertIds.add(id);
                    showToast('告警已关闭', 'info');
                    this.fetchAlertCounts();
                }
            } catch (e) { console.error(e); }
        },
        async completeTask(id) {
            if (!confirm('确认该人工任务已完成？')) return;
            try {
                const res = await fetch(`/api/tasks/${id}/complete`, { method: 'POST' });
                if (res.ok) {
                    this.todayTasks = this.todayTasks.filter(task => task.id !== id);
                    showToast('人工待办已完成', 'info');
                } else {
                    showToast('操作失败', 'error');
                }
            } catch (e) { console.error(e); }
        },
        toggleAlertDetail(id) {
            this.expandedAlertId = this.expandedAlertId === id ? null : id;
        },
        getManualTimeoutHours(task) {
            if (!task || !task.created_at) return 0;
            const createdAt = new Date(task.created_at);
            return (Date.now() - createdAt.getTime()) / 3600000;
        },
        getManualTimeoutLevel(task) {
            const hoursElapsed = this.getManualTimeoutHours(task);
            if (hoursElapsed >= 72) return 'block';
            if (hoursElapsed >= 48) return 'alert';
            if (hoursElapsed >= 24) return 'warn';
            return '';
        },
        getManualTimeoutLabel(task) {
            const level = this.getManualTimeoutLevel(task);
            if (!level) return '';
            const hoursElapsed = this.getManualTimeoutHours(task);
            const days = Math.max(1, Math.floor(hoursElapsed / 24));
            if (level === 'block') return `🚨 已超时 ${days} 天，后续任务已暂停`;
            return `⏰ 已超时 ${days} 天`;
        },
        getManualTimeoutTextClass(task) {
            const level = this.getManualTimeoutLevel(task);
            if (level === 'block') return 'text-red-700';
            if (level === 'alert') return 'text-orange-800';
            if (level === 'warn') return 'text-orange-600';
            return 'text-gray-500';
        },
        getManualCardClass(task) {
            const level = this.getManualTimeoutLevel(task);
            if (level === 'block') return 'bg-red-100 animate-pulse border border-red-300';
            if (level === 'alert') return 'bg-orange-100 border border-orange-200';
            if (level === 'warn') return 'bg-white border border-orange-300';
            return 'bg-white border border-gray-200';
        },
        showManualTimeoutToast() {
            const hasAlert = this.manualTasks.some(task => this.getManualTimeoutLevel(task) === 'alert');
            if (!hasAlert) return;
            showToast('人工待办已超时 48 小时，请尽快处理', 'warn');
        },
        checkAlertToast() {
            if (this.alerts.length === 0) return;
            const latest = this.alerts[0];
            if (!this.lastAlertId) {
                this.lastAlertId = latest.id;
                return;
            }
            if (latest.id !== this.lastAlertId) {
                const toastType = latest.level === 'WARN' ? 'warn' : 'error';
                showToast(`${latest.title}: ${latest.message}`, toastType);
                this.lastAlertId = latest.id;
            }
        },
        getAlertBadgeClass(alert) {
            if (alert.level === 'CRITICAL') return 'bg-red-600 text-white';
            if (alert.level === 'ERROR') return 'bg-red-100 text-red-800';
            if (alert.level === 'WARN') return 'bg-yellow-100 text-yellow-800';
            return 'bg-blue-100 text-blue-800';
        },
        getAlertRowClass(alert) {
            if (alert.level === 'CRITICAL') return 'bg-red-100';
            if (alert.level === 'ERROR') return 'bg-red-50';
            if (alert.level === 'WARN') return 'bg-yellow-50';
            return '';
        },
        getTodayDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = `${now.getMonth() + 1}`.padStart(2, '0');
            const day = `${now.getDate()}`.padStart(2, '0');
            return `${year}-${month}-${day}`;
        },
        formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', { hour12: false });
        },

        async backupSystem() {
                if (!confirm('确定要立即备份数据库吗？')) return;
                try {
                    const res = await fetch('/api/system/backup', { method: 'POST' });
                    const data = await res.json();
                    if (data.code === 0) {
                        showToast('备份成功: ' + data.msg, 'info');
                    } else {
                        showToast('备份失败: ' + data.msg, 'error');
                    }
                } catch (e) {
                    showToast('备份请求出错', 'error');
                }
            }
        }
    }
    </script>
{% endblock %}
