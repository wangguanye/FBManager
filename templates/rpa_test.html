{% extends "base.html" %}

{% block content %}
<div x-data="rpaTestPage()" x-init="init()" class="space-y-6">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold mb-4">&#129514; 行为模块测试</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">选择账号</label>
                <select x-model="selectedAccount" class="w-full border rounded px-3 py-2">
                    <option value="">-- 请选择 --</option>
                    <template x-for="acc in accounts" :key="acc.id">
                        <option :value="String(acc.id)" x-text="`${acc.username} (#${acc.id})`"></option>
                    </template>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">行为模块</label>
                <select x-model="selectedModule" @change="onModuleChange()" class="w-full border rounded px-3 py-2">
                    <option value="">-- 请选择 --</option>
                    <template x-for="mod in modules" :key="mod.action_id">
                        <option :value="mod.action_id" x-text="`${mod.action_id} - ${mod.name}`"></option>
                    </template>
                </select>
            </div>

            <div id="params-form" class="md:col-span-2">
                <template x-if="!selectedModule">
                    <p class="text-sm text-gray-400">选择模块后显示参数</p>
                </template>
                <template x-if="selectedModule">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <template x-for="(schema, key) in getCurrentSchema()" :key="key">
                            <div>
                                <label class="block text-xs text-gray-600 mb-1" x-text="schema.label || key"></label>
                                <template x-if="(schema.type || 'string') === 'number'">
                                    <input type="number" class="w-full border rounded px-3 py-2" x-model="paramValues[key]">
                                </template>
                                <template x-if="(schema.type || 'string') === 'select'">
                                    <select class="w-full border rounded px-3 py-2" x-model="paramValues[key]">
                                        <template x-for="option in (schema.options || [])" :key="String(option)">
                                            <option :value="option" x-text="option"></option>
                                        </template>
                                    </select>
                                </template>
                                <template x-if="(schema.type || 'string') === 'boolean'">
                                    <select class="w-full border rounded px-3 py-2" x-model="paramValues[key]">
                                        <option :value="true">true</option>
                                        <option :value="false">false</option>
                                    </select>
                                </template>
                                <template x-if="!['number', 'select', 'boolean'].includes(schema.type || 'string')">
                                    <input type="text" class="w-full border rounded px-3 py-2" x-model="paramValues[key]">
                                </template>
                            </div>
                        </template>
                        <template x-if="Object.keys(getCurrentSchema()).length === 0">
                            <p class="text-sm text-gray-400">该模块无可配置参数</p>
                        </template>
                    </div>
                </template>
            </div>
        </div>

        <div class="flex items-center gap-4 mt-4">
            <button @click="runSingle()" :disabled="running"
                    class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">
                执行测试
            </button>
            <button @click="runAll()" :disabled="running"
                    class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed">
                全量冒烟测试
            </button>
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="keepOpen"> 测试后保持窗口打开
            </label>
            <span x-show="running" class="text-sm text-blue-600">执行中...</span>
        </div>
    </div>

    <div id="log-area" class="bg-gray-900 rounded-lg p-4 font-mono text-sm max-h-80 overflow-y-auto">
        <template x-if="logs.length === 0">
            <p class="text-gray-500">等待执行...</p>
        </template>
        <template x-for="(entry, idx) in logs" :key="`${entry.time}-${idx}`">
            <div class="leading-6" :class="logClass(entry.level)">
                <span class="text-gray-500 mr-2" x-text="formatLogTime(entry.time)"></span>
                <span class="mr-2" x-text="`[${entry.level}]`"></span>
                <span x-text="entry.message"></span>
            </div>
        </template>
    </div>

    <div x-show="resultCard" class="bg-white rounded-lg shadow p-4 border"
         :class="resultCard && resultCard.success ? 'border-green-200' : 'border-red-200'">
        <div class="text-sm font-semibold" :class="resultCard && resultCard.success ? 'text-green-700' : 'text-red-700'"
             x-text="resultCard && resultCard.success ? '测试成功' : '测试失败'"></div>
        <div class="text-sm text-gray-600 mt-1" x-text="resultCard ? resultCard.message : ''"></div>
        <div class="text-xs text-gray-500 mt-1" x-text="resultCard ? `耗时: ${resultCard.duration_seconds || 0}s` : ''"></div>
        <template x-if="resultCard && resultCard.error_detail">
            <pre class="mt-2 bg-gray-50 border rounded p-2 text-xs text-red-600 whitespace-pre-wrap" x-text="resultCard.error_detail"></pre>
        </template>
    </div>

    <div x-show="runAllSummary" class="bg-white rounded-lg shadow p-4 border border-indigo-200">
        <div class="text-sm font-semibold text-indigo-700">全量冒烟测试完成</div>
        <div class="text-sm text-gray-700 mt-1"
             x-text="runAllSummary ? `共 ${runAllSummary.total} 个模块，成功 ${runAllSummary.passed}，失败 ${runAllSummary.failed}` : ''"></div>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-semibold mb-4">模块健康度</h3>
        <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-2 text-left">模块 ID</th>
                        <th class="px-4 py-2 text-left">行为名称</th>
                        <th class="px-4 py-2 text-left">上次测试</th>
                        <th class="px-4 py-2 text-center">结果</th>
                        <th class="px-4 py-2 text-right">耗时</th>
                        <th class="px-4 py-2 text-left">错误摘要</th>
                        <th class="px-4 py-2 text-center">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="row in getHealthRows()" :key="row.action_id">
                        <tr class="border-t border-gray-100">
                            <td class="px-4 py-2 font-mono text-xs" x-text="row.action_id"></td>
                            <td class="px-4 py-2" x-text="row.name"></td>
                            <td class="px-4 py-2 text-gray-600" x-text="row.latest ? formatDateTime(row.latest.tested_at) : '— 从未测试'"></td>
                            <td class="px-4 py-2 text-center">
                                <span x-show="!row.latest" class="text-gray-400">—</span>
                                <span x-show="row.latest" class="font-semibold"
                                      :class="row.latest && row.latest.success ? 'text-green-600' : 'text-red-600'"
                                      x-text="row.latest && row.latest.success ? '通过' : '失败'"></span>
                            </td>
                            <td class="px-4 py-2 text-right text-gray-600" x-text="row.latest ? `${row.latest.duration_seconds || 0}s` : '-' "></td>
                            <td class="px-4 py-2">
                                <span class="text-red-600" x-text="row.latest && !row.latest.success ? (row.latest.message || '-') : '-' "></span>
                            </td>
                            <td class="px-4 py-2 text-center">
                                <button @click="rerunModule(row.action_id)" :disabled="running"
                                        class="px-2 py-1 text-xs rounded border border-indigo-200 text-indigo-700 hover:bg-indigo-50 disabled:opacity-50">
                                    重新测试
                                </button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function rpaTestPage() {
    return {
        accounts: [],
        modules: [],
        moduleMap: {},
        latestResults: {},
        selectedAccount: '',
        selectedModule: '',
        paramValues: {},
        keepOpen: false,
        running: false,
        currentTestId: null,
        pollingTimer: null,
        logs: [],
        resultCard: null,
        runAllSummary: null,

        async init() {
            await Promise.all([
                this.loadAccounts(),
                this.loadModules(),
            ])
            await this.loadHealth()
        },

        async loadAccounts() {
            try {
                const res = await fetch('/api/accounts?has_binding=true&limit=500')
                if (!res.ok) throw new Error('加载账号失败')
                const data = await res.json()
                this.accounts = Array.isArray(data) ? data : []
                if (!this.selectedAccount && this.accounts.length > 0) {
                    this.selectedAccount = String(this.accounts[0].id)
                }
            } catch (err) {
                showToast(err.message || '加载账号失败', 'error')
            }
        },

        async loadModules() {
            try {
                const res = await fetch('/api/rpa-test/modules')
                if (!res.ok) throw new Error('加载模块失败')
                const data = await res.json()
                this.modules = Array.isArray(data) ? data : []
                this.moduleMap = {}
                this.modules.forEach(mod => {
                    this.moduleMap[mod.action_id] = mod
                })
                if (!this.selectedModule && this.modules.length > 0) {
                    this.selectedModule = this.modules[0].action_id
                    this.onModuleChange()
                }
            } catch (err) {
                showToast(err.message || '加载模块失败', 'error')
            }
        },

        async loadHealth() {
            try {
                const res = await fetch('/api/rpa-test/results?limit=300')
                if (!res.ok) throw new Error('加载测试结果失败')
                const data = await res.json()
                const rows = Array.isArray(data) ? data : []
                const latest = {}
                rows.forEach(row => {
                    const key = this.normalizeActionId(row.action_id)
                    if (!latest[key]) {
                        latest[key] = row
                    }
                })
                this.latestResults = latest
            } catch (err) {
                showToast(err.message || '加载测试结果失败', 'error')
            }
        },

        getHealthRows() {
            return this.modules.map(mod => ({
                action_id: mod.action_id,
                name: mod.name || mod.action_id,
                latest: this.latestResults[this.normalizeActionId(mod.action_id)] || null,
            }))
        },

        normalizeActionId(actionId) {
            if (!actionId) return ''
            return String(actionId).startsWith('rpa.') ? String(actionId).slice(4) : String(actionId)
        },

        getCurrentSchema() {
            const mod = this.moduleMap[this.selectedModule]
            if (!mod || !mod.params_schema) return {}
            return mod.params_schema
        },

        onModuleChange() {
            const schema = this.getCurrentSchema()
            const params = {}
            Object.entries(schema).forEach(([key, item]) => {
                if (item && Object.prototype.hasOwnProperty.call(item, 'default')) {
                    params[key] = item.default
                } else if (item && item.type === 'select' && Array.isArray(item.options)) {
                    params[key] = item.options[0] || ''
                } else if (item && item.type === 'number') {
                    params[key] = 0
                } else if (item && item.type === 'boolean') {
                    params[key] = false
                } else {
                    params[key] = ''
                }
            })
            this.paramValues = params
        },

        buildParams() {
            const schema = this.getCurrentSchema()
            const payload = {}
            Object.entries(schema).forEach(([key, item]) => {
                let value = this.paramValues[key]
                const type = (item && item.type) || 'string'
                if (type === 'number') {
                    const parsed = Number(value)
                    value = Number.isFinite(parsed) ? parsed : Number(item.default || 0)
                } else if (type === 'boolean') {
                    if (typeof value === 'string') {
                        value = value === 'true'
                    } else {
                        value = Boolean(value)
                    }
                } else {
                    value = value == null ? '' : String(value)
                }
                payload[key] = value
            })
            return payload
        },

        async runSingle() {
            if (this.running) return
            if (!this.selectedAccount) {
                showToast('请先选择账号', 'warn')
                return
            }
            if (!this.selectedModule) {
                showToast('请先选择模块', 'warn')
                return
            }

            this.running = true
            this.currentTestId = null
            this.logs = []
            this.resultCard = null
            this.runAllSummary = null
            this.appendLog('INFO', `准备执行模块 ${this.selectedModule}`)

            try {
                const res = await fetch('/api/rpa-test/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        account_id: Number(this.selectedAccount),
                        action_id: this.selectedModule,
                        params: this.buildParams(),
                        keep_open: this.keepOpen,
                    }),
                })
                if (!res.ok) {
                    throw new Error(await res.text())
                }
                const data = await res.json()
                if (!data.test_id) {
                    throw new Error('未拿到 test_id')
                }
                this.currentTestId = data.test_id
                await this.pollLogs()
            } catch (err) {
                this.running = false
                this.appendLog('ERROR', err.message || '执行失败')
                showToast('执行测试失败', 'error')
            }
        },

        async runAll() {
            if (this.running) return
            if (!this.selectedAccount) {
                showToast('请先选择账号', 'warn')
                return
            }

            this.running = true
            this.currentTestId = null
            this.logs = []
            this.resultCard = null
            this.runAllSummary = null
            this.appendLog('INFO', '开始全量冒烟测试...')

            try {
                const res = await fetch('/api/rpa-test/run-all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        account_id: Number(this.selectedAccount),
                        keep_open: this.keepOpen,
                    }),
                })
                if (!res.ok) {
                    throw new Error(await res.text())
                }
                const data = await res.json()
                this.runAllSummary = data
                this.logs = (data.results || []).map(item => ({
                    time: new Date().toISOString(),
                    level: item.success ? 'INFO' : 'ERROR',
                    message: `[${item.action_id}] ${item.message || ''}`,
                }))
                this.running = false
                showToast(`冒烟测试完成：成功 ${data.passed || 0}，失败 ${data.failed || 0}`, 'success')
                await this.loadHealth()
                this.scrollLogToBottom()
            } catch (err) {
                this.running = false
                this.appendLog('ERROR', err.message || '全量冒烟测试失败')
                showToast('全量冒烟测试失败', 'error')
            }
        },

        async pollLogs() {
            if (!this.currentTestId) {
                this.running = false
                return
            }

            try {
                const res = await fetch(`/api/rpa-test/logs/${this.currentTestId}`)
                if (!res.ok) throw new Error('获取日志失败')
                const data = await res.json()

                this.logs = Array.isArray(data.logs) ? data.logs : []
                this.scrollLogToBottom()

                const status = data.status || 'unknown'
                if (status === 'completed' || status === 'failed') {
                    this.running = false
                    this.resultCard = data.result || null
                    this.currentTestId = null
                    showToast(status === 'completed' ? '测试执行完成' : '测试执行失败', status === 'completed' ? 'success' : 'error')
                    await this.loadHealth()
                    return
                }

                this.pollingTimer = setTimeout(() => {
                    this.pollLogs()
                }, 3000)
            } catch (err) {
                this.pollingTimer = setTimeout(() => {
                    this.pollLogs()
                }, 3000)
            }
        },

        rerunModule(actionId) {
            if (!actionId) return
            this.selectedModule = actionId
            this.onModuleChange()
            this.runSingle()
        },

        appendLog(level, message) {
            this.logs.push({
                time: new Date().toISOString(),
                level,
                message,
            })
            this.scrollLogToBottom()
        },

        scrollLogToBottom() {
            this.$nextTick(() => {
                const panel = document.getElementById('log-area')
                if (panel) panel.scrollTop = panel.scrollHeight
            })
        },

        logClass(level) {
            if (level === 'ERROR' || level === 'CRITICAL') return 'text-red-400'
            if (level === 'WARN') return 'text-yellow-300'
            return 'text-green-400'
        },

        formatLogTime(value) {
            if (!value) return ''
            const date = new Date(value)
            if (Number.isNaN(date.getTime())) return value
            return date.toLocaleTimeString()
        },

        formatDateTime(value) {
            if (!value) return '-'
            const date = new Date(value)
            if (Number.isNaN(date.getTime())) return value
            return date.toLocaleString()
        },
    }
}
</script>
{% endblock %}
