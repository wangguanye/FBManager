{% extends "base.html" %}

{% block content %}
<div x-data="proxiesManager()" x-init="fetchProxies()" class="space-y-6">
    <!-- 顶部操作栏 -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-lg shadow-sm">
        <div class="flex items-center gap-4 w-full sm:w-auto">
            <button @click="openCreateModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                新增代理
            </button>
            <button @click="openBatchModal()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                批量导入
            </button>
            <button @click="openCsvModal()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition flex items-center gap-2">
                📁 CSV 导入
            </button>
            <div class="relative">
                <select x-model="statusFilter" @change="fetchProxies()" class="appearance-none bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 pr-8">
                    <option value="">所有状态</option>
                    <option value="空闲">空闲</option>
                    <option value="使用中">使用中</option>
                    <option value="异常">异常</option>
                    <option value="永久禁用">永久禁用</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                    <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
        </div>
        <div class="w-full sm:w-64 relative">
            <input type="text" x-model="searchQuery" @keydown.enter="fetchProxies()" placeholder="搜索 Host 或用户名..." class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-10 p-2.5">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>
    </div>

    <!-- 代理列表表格 -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Host:Port</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">地区</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户名</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <template x-for="proxy in proxies" :key="proxy.id">
                    <tr :class="{'bg-red-50': proxy.status === '永久禁用'}">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="proxy.id"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" x-text="proxy.host + ':' + proxy.port"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="proxy.type"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="proxy.region || '-'"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="proxy.username || '-'"></td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span :class="getStatusColor(proxy.status)" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-opacity-10" x-text="proxy.status"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button @click="openEditModal(proxy)" class="text-indigo-600 hover:text-indigo-900">编辑</button>
                        </td>
                    </tr>
                </template>
                <tr x-show="proxies.length === 0">
                    <td colspan="7" class="px-6 py-4 text-center text-sm text-gray-500">暂无代理数据</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 新增/编辑模态框 -->
    <div x-show="showModal" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex items-center justify-center min-h-screen px-4 text-center">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="showModal = false"></div>
            <div class="inline-block w-full max-w-md p-6 my-8 overflow-hidden text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl">
                <h3 class="text-lg font-medium leading-6 text-gray-900 mb-4" x-text="isEdit ? '编辑代理' : '新增代理'"></h3>
                <form @submit.prevent="saveProxy">
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Host</label>
                                <input type="text" x-model="form.host" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Port</label>
                                <input type="number" x-model="form.port" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">用户名</label>
                                <input type="text" x-model="form.username" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">密码</label>
                                <input type="text" x-model="form.password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" :placeholder="isEdit ? '不修改留空' : ''">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">类型</label>
                                <select x-model="form.type" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                                    <option value="socks5">SOCKS5</option>
                                    <option value="http">HTTP</option>
                                    <option value="https">HTTPS</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">地区</label>
                                <input type="text" x-model="form.region" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">状态</label>
                            <select x-model="form.status" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                                <option value="空闲" :disabled="isEdit && originalStatus === '永久禁用'">空闲</option>
                                <option value="使用中" :disabled="isEdit && originalStatus === '永久禁用'">使用中</option>
                                <option value="异常">异常</option>
                                <option value="永久禁用">永久禁用</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end gap-3">
                        <button type="button" @click="showModal = false" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">取消</button>
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- 批量导入模态框 -->
    <div x-show="showBatchModal" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex items-center justify-center min-h-screen px-4 text-center">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="showBatchModal = false"></div>
            <div class="inline-block w-full max-w-4xl p-6 my-8 overflow-hidden text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl">
                <h3 class="text-lg font-medium leading-6 text-gray-900 mb-4">批量导入代理</h3>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">每行一条，格式：IP地址:端口:用户名:密码</label>
                    <textarea x-model="batchText" rows="8" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" placeholder="130.180.231.83:8225:user:pass"></textarea>
                </div>
                
                <template x-if="importResult">
                    <div class="mb-4 p-4 bg-gray-50 rounded-md">
                        <p class="text-sm font-medium" :class="{'text-green-600': importResult.fail_count === 0, 'text-red-600': importResult.fail_count > 0}">
                            导入完成：成功 <span x-text="importResult.success_count"></span> 个，失败 <span x-text="importResult.fail_count"></span> 个
                        </p>
                        <template x-if="importResult.errors && importResult.errors.length > 0">
                            <ul class="mt-2 text-xs text-red-500 list-disc list-inside h-32 overflow-y-auto">
                                <template x-for="err in importResult.errors" :key="err.line">
                                    <li x-text="'第 ' + err.line + ' 行: ' + err.reason"></li>
                                </template>
                            </ul>
                        </template>
                    </div>
                </template>

                <div class="mt-6 flex justify-end gap-3">
                    <button type="button" @click="showBatchModal = false" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">关闭</button>
                    <button type="button" @click="batchImport" :disabled="!batchText" class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 disabled:opacity-50">开始导入</button>
                </div>
            </div>
        </div>
    </div>
    <div x-show="showCsvModal" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex items-center justify-center min-h-screen px-4 text-center">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="closeCsvModal()"></div>
            <div class="inline-block w-full max-w-5xl p-6 my-8 overflow-hidden text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-medium leading-6 text-gray-900">CSV 导入代理</h3>
                    <a href="/api/proxies/import/template" class="text-sm text-indigo-600 hover:text-indigo-800">下载模板</a>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-1 space-y-4">
                        <div class="border border-dashed border-gray-300 rounded-lg p-4 text-center" @dragover.prevent @drop.prevent="handleCsvDrop($event)">
                            <div class="text-sm text-gray-600">拖拽 CSV 文件到此处</div>
                            <div class="text-xs text-gray-400 mt-1">支持标准 CSV 或冒号分隔格式</div>
                            <input type="file" accept=".csv" class="mt-3 w-full text-sm" @change="handleCsvFileChange($event)">
                            <div class="mt-2 text-xs text-gray-500" x-text="csvFileName || '未选择文件'"></div>
                        </div>
                        <div class="border border-gray-200 rounded-lg p-4 space-y-3">
                            <div class="text-sm font-semibold text-gray-900">导入选项</div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">默认代理类型</label>
                                <select x-model="csvOptions.default_type" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                                    <option value="socks5">SOCKS5</option>
                                    <option value="http">HTTP</option>
                                    <option value="https">HTTPS</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">默认地区</label>
                                <input type="text" x-model="csvOptions.default_region" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                            </div>
                        </div>
                        <div class="border border-gray-200 rounded-lg p-4">
                            <div class="text-sm font-semibold text-gray-900">预览统计</div>
                            <div class="text-sm text-gray-600 mt-2">
                                总行数：<span x-text="csvPreviewStats.total"></span>
                            </div>
                            <div class="text-sm text-green-600 mt-1">
                                可导入：<span x-text="csvPreviewStats.valid"></span>
                            </div>
                            <div class="text-sm text-red-600 mt-1">
                                异常行：<span x-text="csvPreviewStats.invalid"></span>
                            </div>
                        </div>
                    </div>
                    <div class="lg:col-span-2 space-y-4">
                        <div class="border border-gray-200 rounded-lg overflow-hidden">
                            <div class="px-4 py-2 bg-gray-50 text-sm font-semibold text-gray-700">预览</div>
                            <div class="max-h-72 overflow-y-auto">
                                <table class="min-w-full divide-y divide-gray-200 text-sm">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">行号</th>
                                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Host</th>
                                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Port</th>
                                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">用户名</th>
                                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">密码</th>
                                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        <template x-for="row in csvPreviewRows" :key="row.line">
                                            <tr :class="row.valid ? '' : 'bg-red-50'">
                                                <td class="px-3 py-2 text-gray-600" x-text="row.line"></td>
                                                <td class="px-3 py-2 text-gray-900" x-text="row.host"></td>
                                                <td class="px-3 py-2 text-gray-600" x-text="row.port"></td>
                                                <td class="px-3 py-2 text-gray-600" x-text="row.username || '-'"></td>
                                                <td class="px-3 py-2 text-gray-600" x-text="row.has_password ? '有' : '-'"></td>
                                                <td class="px-3 py-2 text-xs" :class="row.valid ? 'text-green-600' : 'text-red-600'" x-text="row.valid ? '通过' : row.error"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="border border-gray-200 rounded-lg p-4">
                            <div class="text-sm font-semibold text-gray-900">导入结果</div>
                            <div x-show="csvImportResult" class="text-sm text-gray-700 mt-2">
                                成功导入 <span x-text="csvImportResult.imported || 0"></span> 条，跳过 <span x-text="csvImportResult.skipped || 0"></span> 条
                            </div>
                            <div x-show="csvImportErrors.length > 0" class="mt-2 max-h-32 overflow-y-auto text-xs text-red-600">
                                <template x-for="err in csvImportErrors" :key="err.line">
                                    <div x-text="'第 ' + err.line + ' 行: ' + err.reason"></div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-6 flex justify-end gap-3">
                    <button type="button" @click="closeCsvModal()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">关闭</button>
                    <button type="button" @click="confirmProxiesCsvImport()" :disabled="csvUploading || csvParsedRows.length === 0" class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 disabled:opacity-50">开始导入</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function proxiesManager() {
        return {
            proxies: [],
            statusFilter: '',
            searchQuery: '',
            showModal: false,
            showBatchModal: false,
            showCsvModal: false,
            batchText: '',
            importResult: null,
            csvFileName: '',
            csvPreviewRows: [],
            csvPreviewErrors: [],
            csvPreviewStats: { total: 0, valid: 0, invalid: 0 },
            csvParsedRows: [],
            csvImportResult: null,
            csvImportErrors: [],
            csvUploading: false,
            csvOptions: {
                default_type: 'socks5',
                default_region: ''
            },
            isEdit: false,
            originalStatus: '',
            form: {
                id: null,
                host: '',
                port: '',
                username: '',
                password: '',
                type: 'socks5',
                region: '',
                status: '空闲'
            },

            async fetchProxies() {
                let url = '/api/proxies?';
                if (this.statusFilter) url += `status=${this.statusFilter}&`;
                if (this.searchQuery) url += `q=${this.searchQuery}&`;
                
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        this.proxies = await response.json();
                    }
                } catch (error) {
                    console.error('Error fetching proxies:', error);
                }
            },

            openCreateModal() {
                this.isEdit = false;
                this.originalStatus = '';
                this.form = {
                    id: null,
                    host: '',
                    port: '',
                    username: '',
                    password: '',
                    type: 'socks5',
                    region: '',
                    status: '空闲'
                };
                this.showModal = true;
            },

            openBatchModal() {
                this.batchText = '';
                this.importResult = null;
                this.showBatchModal = true;
            },

            async batchImport() {
                try {
                    const res = await fetch('/api/proxies/batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ raw_text: this.batchText })
                    });
                    this.importResult = await res.json();
                    if (this.importResult.success_count > 0) {
                        this.fetchProxies();
                    }
                } catch (e) {
                    console.error(e);
                    alert('导入出错');
                }
            },

            openCsvModal() {
                this.resetCsvImportState()
                this.showCsvModal = true
            },

            closeCsvModal() {
                this.showCsvModal = false
            },

            resetCsvImportState() {
                this.csvFileName = ''
                this.csvPreviewRows = []
                this.csvPreviewErrors = []
                this.csvPreviewStats = { total: 0, valid: 0, invalid: 0 }
                this.csvParsedRows = []
                this.csvImportResult = null
                this.csvImportErrors = []
                this.csvUploading = false
            },

            handleCsvFileChange(event) {
                const file = event.target.files?.[0]
                if (!file) return
                this.uploadProxiesCsvPreview(file)
            },

            handleCsvDrop(event) {
                const file = event.dataTransfer?.files?.[0]
                if (!file) return
                this.uploadProxiesCsvPreview(file)
            },

            async uploadProxiesCsvPreview(file) {
                if (!file) return
                this.csvUploading = true
                this.csvFileName = file.name
                try {
                    const formData = new FormData()
                    formData.append('file', file)
                    const res = await fetch('/api/proxies/import/csv', {
                        method: 'POST',
                        body: formData
                    })
                    if (!res.ok) {
                        alert('解析失败')
                        return
                    }
                    const payload = await res.json()
                    const data = payload.data || {}
                    this.csvPreviewRows = data.preview || []
                    this.csvPreviewErrors = data.errors || []
                    this.csvPreviewStats = {
                        total: data.total || 0,
                        valid: data.valid || 0,
                        invalid: data.invalid || 0
                    }
                    this.csvParsedRows = data.rows || []
                } catch (e) {
                    console.error(e)
                    alert('解析出错')
                } finally {
                    this.csvUploading = false
                }
            },

            async confirmProxiesCsvImport() {
                if (this.csvParsedRows.length === 0) return
                try {
                    const res = await fetch('/api/proxies/import/csv/confirm', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            rows: this.csvParsedRows,
                            options: this.csvOptions
                        })
                    })
                    if (!res.ok) {
                        alert('导入失败')
                        return
                    }
                    const payload = await res.json()
                    this.csvImportResult = payload.data || null
                    this.csvImportErrors = this.csvImportResult?.errors || []
                    if (this.csvImportResult?.imported > 0) {
                        this.fetchProxies()
                    }
                } catch (e) {
                    console.error(e)
                    alert('导入出错')
                }
            },

            openEditModal(proxy) {
                this.isEdit = true;
                this.originalStatus = proxy.status;
                this.form = {
                    id: proxy.id,
                    host: proxy.host,
                    port: proxy.port,
                    username: proxy.username,
                    password: '', // Password is not returned by API
                    type: proxy.type,
                    region: proxy.region,
                    status: proxy.status
                };
                this.showModal = true;
            },

            async saveProxy() {
                const url = this.isEdit ? `/api/proxies/${this.form.id}` : '/api/proxies';
                const method = this.isEdit ? 'PATCH' : 'POST';

                const disabledStatus = '\u6c38\u4e45\u7981\u7528';
                if (this.isEdit && this.form.status === disabledStatus && this.originalStatus !== disabledStatus) {
                    const confirmed = confirm(
                        '\u2757 \u786e\u8ba4\u6c38\u4e45\u7981\u7528\u6b64\u4ee3\u7406\uff1f\n\n' +
                        '\u8fd9\u5c06\u540c\u65f6\uff1a\n' +
                        '\u2022 \u5c01\u7981\u7ed1\u5b9a\u7684 FB \u8d26\u53f7\n' +
                        '\u2022 \u7981\u7528\u7ed1\u5b9a\u7684\u6d4f\u89c8\u5668\u7a97\u53e3\n\n' +
                        '\u6b64\u64cd\u4f5c\u4e0d\u53ef\u64a4\u9500\uff01'
                    );
                    if (!confirmed) return;
                }

                const payload = {
                    host: this.form.host,
                    port: parseInt(this.form.port),
                    username: this.form.username || null,
                    type: this.form.type,
                    region: this.form.region || null,
                    status: this.form.status
                };

                if (this.form.password) {
                    payload.password = this.form.password;
                }

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json().catch(() => ({}));
                    if (response.ok) {
                        this.showModal = false;
                        this.fetchProxies();
                        if (result.cascade) {
                            showToast(
                                `\u7ea7\u8054\u64cd\u4f5c\u5b8c\u6210\uff1a\u8d26\u53f7 ${result.cascade.account || '-'} \u5df2\u5c01\u7981\uff0c\u7a97\u53e3 ${result.cascade.window || '-'} \u5df2\u7981\u7528`,
                                'warn'
                            );
                        }
                    } else {
                        alert('\u4fdd\u5b58\u5931\u8d25: ' + ((result && result.detail) || '\u672a\u77e5\u9519\u8bef'));
                    }
                } catch (error) {
                    console.error('Error saving proxy:', error);
                    alert('\u4fdd\u5b58\u5931\u8d25');
                }
            },

            getStatusColor(status) {
                switch(status) {
                    case '空闲': return 'text-green-800 bg-green-100';
                    case '使用中': return 'text-blue-800 bg-blue-100';
                    case '异常': return 'text-yellow-800 bg-yellow-100';
                    case '永久禁用': return 'text-red-800 bg-red-100';
                    default: return 'text-gray-800 bg-gray-100';
                }
            }
        }
    }
</script>
{% endblock %}
