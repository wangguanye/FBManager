{% extends "base.html" %}

{% block content %}
<div x-data="logs()" x-init="init()">
    <!-- 顶部筛选栏 -->
    <div class="bg-white rounded-lg shadow p-4 mb-6 sticky top-0 z-10">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
            <!-- 账号下拉 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">账号</label>
                <select x-model="filters.account_id" @change="resetAndFetch()" class="w-full border-gray-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                    <option value="">全部账号</option>
                    <template x-for="acc in accounts" :key="acc.id">
                        <option :value="acc.id" x-text="acc.account_name || acc.id"></option>
                    </template>
                </select>
            </div>
            <!-- 日期范围 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">开始日期</label>
                <input type="date" x-model="filters.date_start" @change="resetAndFetch()" class="w-full border-gray-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">结束日期</label>
                <input type="date" x-model="filters.date_end" @change="resetAndFetch()" class="w-full border-gray-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
            </div>
            <!-- 级别多选 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">日志级别</label>
                <div class="flex space-x-2 mt-2">
                    <label class="inline-flex items-center">
                        <input type="checkbox" value="INFO" x-model="filters.levels" @change="resetAndFetch()" class="rounded border-gray-300 text-indigo-600 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        <span class="ml-1 text-sm text-gray-700">INFO</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" value="WARN" x-model="filters.levels" @change="resetAndFetch()" class="rounded border-gray-300 text-yellow-600 shadow-sm focus:border-yellow-300 focus:ring focus:ring-yellow-200 focus:ring-opacity-50">
                        <span class="ml-1 text-sm text-gray-700">WARN</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" value="ERROR" x-model="filters.levels" @change="resetAndFetch()" class="rounded border-gray-300 text-red-600 shadow-sm focus:border-red-300 focus:ring focus:ring-red-200 focus:ring-opacity-50">
                        <span class="ml-1 text-sm text-gray-700">ERROR</span>
                    </label>
                </div>
            </div>
            <!-- 搜索框 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">关键词搜索</label>
                <input type="text" x-model="filters.keyword" @keydown.enter="resetAndFetch()" placeholder="输入内容搜索..." class="w-full border-gray-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
            </div>
        </div>
    </div>

    <!-- 日志表格 -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">时间戳</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">账号</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">任务ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">行为模块</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">级别</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">内容</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <template x-for="log in logs" :key="log.id">
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(log.created_at)"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="log.fb_account_id || '-'"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="log.task_id || '-'"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="log.action_type"></td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                  :class="{
                                      'bg-blue-100 text-blue-800': log.level === 'INFO',
                                      'bg-yellow-100 text-yellow-800': log.level === 'WARN',
                                      'bg-red-100 text-red-800': log.level === 'ERROR',
                                      'bg-red-600 text-white': log.level === 'CRITICAL'
                                  }"
                                  x-text="log.level">
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-900 break-all" x-text="log.message"></td>
                    </tr>
                </template>
                <tr x-show="logs.length === 0 && !loading">
                    <td colspan="6" class="px-6 py-4 text-center text-sm text-gray-500">暂无日志数据</td>
                </tr>
            </tbody>
        </table>
        
        <!-- Loading Indicator / Sentinel -->
        <div x-ref="sentinel" class="py-4 text-center text-gray-500">
            <span x-show="loading">加载中...</span>
            <span x-show="!loading && !hasMore && logs.length > 0">没有更多日志了</span>
        </div>
    </div>
</div>

<script>
function logs() {
    return {
        logs: [],
        accounts: [],
        filters: {
            account_id: '',
            date_start: '',
            date_end: '',
            levels: [],
            keyword: ''
        },
        page: 1,
        size: 50,
        loading: false,
        hasMore: true,
        observer: null,

        init() {
            this.fetchAccounts();
            this.fetchLogs();
            
            // Intersection Observer for Infinite Scroll
            this.observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !this.loading && this.hasMore) {
                    this.page++;
                    this.fetchLogs(true);
                }
            }, { threshold: 0.1 });
            
            if (this.$refs.sentinel) {
                this.observer.observe(this.$refs.sentinel);
            }
        },

        async fetchAccounts() {
            try {
                const res = await fetch('/api/accounts?limit=1000');
                if (res.ok) this.accounts = await res.json();
            } catch (e) { console.error(e); }
        },

        async fetchLogs(append = false) {
            if (this.loading) return;
            this.loading = true;

            const params = new URLSearchParams({
                page: this.page,
                size: this.size
            });
            
            if (this.filters.account_id) params.append('account_id', this.filters.account_id);
            if (this.filters.date_start) params.append('date_start', this.filters.date_start);
            if (this.filters.date_end) params.append('date_end', this.filters.date_end);
            if (this.filters.levels.length > 0) params.append('level', this.filters.levels.join(','));
            if (this.filters.keyword) params.append('keyword', this.filters.keyword);

            try {
                const res = await fetch(`/api/logs?${params.toString()}`);
                if (res.ok) {
                    const newLogs = await res.json();
                    if (append) {
                        this.logs = [...this.logs, ...newLogs];
                    } else {
                        this.logs = newLogs;
                    }
                    this.hasMore = newLogs.length === this.size;
                }
            } catch (e) { 
                console.error(e); 
            } finally {
                this.loading = false;
            }
        },

        resetAndFetch() {
            this.page = 1;
            this.hasMore = true;
            this.logs = [];
            this.fetchLogs();
        },

        formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', { hour12: false });
        }
    }
}
</script>
{% endblock %}
